name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64
          - os: windows-latest
            target: windows-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onefile \
            --name whatskeep-${{ matrix.target }} \
            --collect-all whatskeep \
            --hidden-import whatskeep.db.macos \
            --hidden-import whatskeep.db.windows \
            --hidden-import whatskeep.db.linux \
            --hidden-import whatskeep.platform.macos \
            --hidden-import whatskeep.platform.windows \
            --hidden-import whatskeep.platform.linux \
            src/whatskeep/__main__.py
        shell: bash

      - name: Test binary runs
        run: ./dist/whatskeep-${{ matrix.target }} version
        shell: bash
        if: runner.os != 'Windows'

      - name: Test binary runs (Windows)
        run: dist\whatskeep-${{ matrix.target }}.exe version
        shell: cmd
        if: runner.os == 'Windows'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatskeep-${{ matrix.target }}
          path: dist/whatskeep-*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install build twine
      - run: python -m build
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum whatskeep-* > SHA256SUMS.txt 2>/dev/null || true
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/whatskeep-*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Install

            **With Python (all platforms):**
            ```bash
            pip install whatskeep
            ```

            **Standalone binary (no Python required):**
            Download the binary for your platform below, make it executable, and run:
            ```bash
            # macOS (Apple Silicon)
            chmod +x whatskeep-macos-arm64
            ./whatskeep-macos-arm64 version

            # macOS (Intel)
            chmod +x whatskeep-macos-x86_64
            ./whatskeep-macos-x86_64 version

            # Linux
            chmod +x whatskeep-linux-x86_64
            ./whatskeep-linux-x86_64 version

            # Windows — just double-click or run:
            whatskeep-windows-x86_64.exe version
            ```
