name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64
          - os: windows-latest
            target: windows-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Build binary
        run: pyinstaller --onefile --name whatskeep-${{ matrix.target }} src/whatskeep/__main__.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatskeep-${{ matrix.target }}
          path: dist/whatskeep-*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create checksums
        run: |
          cd artifacts && find . -type f -name "whatskeep-*" | while read f; do sha256sum "$f"; done > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
