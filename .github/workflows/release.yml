name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64
          - os: windows-latest
            target: windows-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Set icon path
        id: icon
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "flag=--icon=assets/whatskeep.ico" >> $GITHUB_OUTPUT
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "flag=--icon=assets/whatskeep.icns" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Common PyInstaller flags
        id: common
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            SEP=";"
          else
            SEP=":"
          fi
          echo "flags=--collect-all whatskeep --add-data assets${SEP}assets --hidden-import whatskeep.db.macos --hidden-import whatskeep.db.windows --hidden-import whatskeep.db.linux --hidden-import whatskeep.platform.macos --hidden-import whatskeep.platform.windows --hidden-import whatskeep.platform.linux --hidden-import whatskeep.tray --hidden-import pystray --hidden-import PIL --hidden-import PIL._tkinter_finder --hidden-import shellingham --hidden-import shellingham.posix --hidden-import shellingham.nt" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build GUI binary (tray app, no console)
        run: |
          pyinstaller \
            --onefile --windowed \
            --name whatskeep-${{ matrix.target }} \
            ${{ steps.icon.outputs.flag }} \
            ${{ steps.common.outputs.flags }} \
            src/whatskeep/gui.py
        shell: bash

      - name: Build CLI binary (terminal)
        run: |
          pyinstaller \
            --onefile \
            --name whatskeep-cli-${{ matrix.target }} \
            ${{ steps.icon.outputs.flag }} \
            ${{ steps.common.outputs.flags }} \
            src/whatskeep/__main__.py
        shell: bash

      - name: Test CLI binary
        run: ./dist/whatskeep-cli-${{ matrix.target }} version
        shell: bash
        if: runner.os != 'Windows'

      - name: Test CLI binary (Windows)
        run: dist\whatskeep-cli-${{ matrix.target }}.exe version
        shell: cmd
        if: runner.os == 'Windows'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatskeep-${{ matrix.target }}
          path: dist/whatskeep-*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install build twine
      - run: python -m build
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    if: always() && needs.build-binaries.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          ls -la whatskeep-* 2>/dev/null
          sha256sum whatskeep-* > SHA256SUMS.txt
          echo "Checksums:"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/whatskeep-*
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Install

            **With Python (all platforms):**
            ```bash
            pip install whatskeep
            ```

            **Standalone binary (no Python required):**
            Download the binary for your platform below, make it executable, and run:
            ```bash
            # macOS (Apple Silicon)
            chmod +x whatskeep-macos-arm64
            ./whatskeep-macos-arm64 version

            # macOS (Intel)
            chmod +x whatskeep-macos-x86_64
            ./whatskeep-macos-x86_64 version

            # Linux
            chmod +x whatskeep-linux-x86_64
            ./whatskeep-linux-x86_64 version

            # Windows — just double-click or run:
            whatskeep-windows-x86_64.exe version
            ```

      - name: Update PyPI badge cache buster in README
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|pypi/v/whatskeep?v=[^\"]*|pypi/v/whatskeep?v=${VERSION}|" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update PyPI badge to v${VERSION}"
          git pull --rebase origin main || true
          git push origin HEAD:main || echo "Badge push failed (non-critical)"
